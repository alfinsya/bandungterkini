name: Build and Deploy to cPanel

on:
  push:
    branches: [ main ]
  workflow_dispatch:
  repository_dispatch:

jobs:
  ftp-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history not needed but safe

      - name: Setup Node (optional)
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          if [ -f package.json ]; then npm ci; fi

      - name: Run static generator
        run: node tools/generate.js
        env:
          SHEETS_URL: ${{ secrets.SHEETS_URL }}

      - name: Debug workspace
        run: |
          echo "pwd=$(pwd)"
          ls -al

      - name: Deploy via SFTP to cPanel
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "article,css,js,img,lib,scripts,index.html,articles.json,contact.html,login.html,register.html,search.html,news.html"
          target: /home/wartajan/public_html/
          rm: true
